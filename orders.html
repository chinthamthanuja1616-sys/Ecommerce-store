<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>📦 My Orders</h1>

{% if orders %}
    {% for order in orders %}
        <div>
            <h3>{{ order.product_name }}</h3>
            <p>Order ID: {{ order.id }}</p>
            <p>Status: <strong>{{ order.status }}</strong></p>
        </div>
    {% endfor %}
{% else %}
    <p>No orders found.</p>
{% endif %}

<br>
<a href="{{ url_for('home') }}">Continue Shopping</a>

</body>
</html>
