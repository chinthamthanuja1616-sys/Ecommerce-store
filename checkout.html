<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Checkout</h1>

{% if cart %}
    <h2>Order Summary</h2>

    {% for item in cart %}
        <p>{{ item.name }} - ₹{{ item.price }}</p>
    {% endfor %}

    <h2>Total: ₹{{ total }}</h2>

    <form method="POST">
        <button type="submit">Place Order</button>
    </form>
{% else %}
    <p>Your cart is empty.</p>
{% endif %}

<br>
<a href="{{ url_for('cart') }}">Back to Cart</a>

</body>
</html>
